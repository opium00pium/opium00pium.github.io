<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last.fm Stats</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Your Last.fm Stats</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Top Tracks</a></li>
                <li><a href="#">Top Artists</a></li>
                <li><a href="#">Recent Scrobbles</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="search-section">
            <h2>Search for Last.fm User Stats</h2>
            <form id="search-form">
                <label for="username">Last.fm Username:</label>
                <input type="text" id="username" name="username" required>
                <button type="submit">Search</button>
            </form>
        </section>

        <section class="top-tracks">
            <h2>Top Tracks</h2>
            <ol>
                <!-- Top tracks will be populated dynamically by JavaScript -->
            </ol>
        </section>

        <section class="top-artists">
            <h2>Top Artists</h2>
            <ol>
                <!-- Top artists will be populated dynamically by JavaScript -->
            </ol>
        </section>

        <section class="recent-scrobbles">
            <h2>Recent Scrobbles</h2>
            <ul>
                <!-- Recent scrobbles will be populated dynamically by JavaScript -->
            </ul>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 Your Last.fm Stats</p>
    </footer>

    <script>
        // Paste the JavaScript code here
    </script>
</body>
</html>
