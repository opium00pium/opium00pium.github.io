<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Last.fm Artist Map</title>
  <style>
    /* Add your CSS styles here */
  </style>
</head>
<body>
  <h1>Last.fm Scrobbled Artists Map</h1>
  
  <!-- Add the input field and search button -->
  <div>
    <input type="text" id="usernameInput" placeholder="Enter Last.fm username">
    <button id="searchButton">Search</button>
  </div>

  <div id="map"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://leafletjs.com/examples/quick-start/leaflet.js"></script>
  <script>
    $(document).ready(function() {
      const lastfmApiKey = 'f300a77ab43d32535699e655d2208a86';
      let lastfmUsername = '';

      // Initialize an empty map
      const map = L.map('map').setView([0, 0], 2);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

      // Update the API call based on the selected username
      function updateApiUrl(username) {
        return `https://ws.audioscrobbler.com/2.0/?method=user.getTopArtists&user=${username}&api_key=${lastfmApiKey}&format=json`;
      }

      // Function to fetch artist info and update the map
      function fetchArtistInfo(artistName) {
        const musicBrainzUrl = `https://musicbrainz.org/ws/2/artist/?query=${encodeURIComponent(artistName)}&fmt=json`;

        $.get(musicBrainzUrl, function(data) {
          if (data.artists.length > 0) {
            const artist = data.artists[0];

            function addMarker(artistName, lat, lon) {
              const marker = L.marker([lat, lon]).addTo(map);
              marker.bindPopup(artistName);
            }

            if (artist.begin_area) {
              const lat = artist.begin_area.coordinates.latitude;
              const lon = artist.begin_area.coordinates.longitude;
              addMarker(artist.name, lat, lon);
            }
          }
        });
      }

      // Function to handle search button click
      $('#searchButton').click(function() {
        lastfmUsername = $('#usernameInput').val();
        if (lastfmUsername) {
          const apiUrl = updateApiUrl(lastfmUsername);

          $.get(apiUrl, function(data) {
            const artists = data.topartists.artist;

            // Clear existing markers from the map
            map.eachLayer(layer => {
              if (layer instanceof L.Marker) {
                map.removeLayer(layer);
              }
            });

            for (const artist of artists) {
              fetchArtistInfo(artist.name);
            }
          });
        }
      });
    });
  </script>
</body>
</html>
