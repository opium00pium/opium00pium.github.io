<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last.fm Stats</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="progress-container" id="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
    </div>
    
    <header>
        <h1>Your Last.fm Stats</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Top Tracks</a></li>
                <li><a href="#">Top Artists</a></li>
                <li><a href="#">Recent Scrobbles</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="search-section">
            <h2>Search for Last.fm User Stats</h2>
            <form id="search-form">
                <label for="username">Last.fm Username:</label>
                <input type="text" id="username" name="username" required>
                <button type="submit">Search</button>
            </form>
        </section>

        <section class="top-tracks">
            <h2>Top Tracks</h2>
            <ol>
                <!-- Top tracks will be populated dynamically by JavaScript -->
            </ol>
        </section>

        <section class="top-artists">
            <h2>Top Artists</h2>
            <ol>
                <!-- Top artists will be populated dynamically by JavaScript -->
            </ol>
        </section>

        <section class="recent-scrobbles">
            <h2>Recent Scrobbles</h2>
            <ul>
                <!-- Recent scrobbles will be populated dynamically by JavaScript -->
            </ul>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 Your Last.fm Stats</p>
    </footer>

    <script>
        const searchForm = document.getElementById('search-form');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const apiKey = 'f300a77ab43d32535699e655d2208a86'; // Your Last.fm API key

        searchForm.addEventListener('submit', async function(event) {
            event.preventDefault();

            const usernameInput = document.getElementById('username');
            const username = usernameInput.value;

            const topTracksList = document.querySelector('.top-tracks ol');
            const topArtistsList = document.querySelector('.top-artists ol');
            const recentScrobblesList = document.querySelector('.recent-scrobbles ul');

            // Show progress bar
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';

            try {
                // Fetch user stats and update UI
                const userStats = await fetchUserStats(username); // Replace with your API call

                // Update UI
                // ...

            } catch (error) {
                console.error('Error fetching user stats:', error);
            } finally {
                // Hide progress bar
                progressContainer.style.display = 'none';
            }
        });

        async function fetchUserStats(username) {
            // Construct the API URL with your API key
            const apiEndpoint = `https://ws.audioscrobbler.com/2.0/?method=user.getinfo&user=${username}&api_key=${apiKey}&format=json`;

            // Fetch user stats
            const response = await fetch(apiEndpoint, {
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                },
                onDownloadProgress: function (progressEvent) {
                    const percentCompleted = Math.round((progressEvent.loaded / progressEvent.total) * 100);
                    progressBar.style.width = percentCompleted + '%';
                }
            });

            // Parse and return data
            const data = await response.json();
            return data;
        }
    </script>
</body>
</html>
