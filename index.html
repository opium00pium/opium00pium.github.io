<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Last.fm Artist Map</title>
  <style>
    /* Add your CSS styles here */
  </style>
</head>
<body>
  <h1>Last.fm Scrobbled Artists Map</h1>
  <div id="map"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://leafletjs.com/examples/quick-start/leaflet.js"></script>
  <script>
    $(document).ready(function() {
      const lastfmApiKey = 'YOUR_LASTFM_API_KEY';
      const lastfmUsername = 'USER_USERNAME';

      const apiUrl = `https://ws.audioscrobbler.com/2.0/?method=user.getTopArtists&user=${lastfmUsername}&api_key=${lastfmApiKey}&format=json`;

      $.get(apiUrl, function(data) {
        const artists = data.topartists.artist;

        function fetchArtistInfo(artistName) {
          const musicBrainzUrl = `https://musicbrainz.org/ws/2/artist/?query=${encodeURIComponent(artistName)}&fmt=json`;

          $.get(musicBrainzUrl, function(data) {
            if (data.artists.length > 0) {
              const artist = data.artists[0];

              const map = L.map('map').setView([0, 0], 2);
              L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

              function addMarker(artistName, lat, lon) {
                const marker = L.marker([lat, lon]).addTo(map);
                marker.bindPopup(artistName);
              }

              if (artist.begin_area) {
                const lat = artist.begin_area.coordinates.latitude;
                const lon = artist.begin_area.coordinates.longitude;
                addMarker(artist.name, lat, lon);
              }
            }
          });
        }

        for (const artist of artists) {
          fetchArtistInfo(artist.name);
        }
      });
    });
  </script>
</body>
</html>
