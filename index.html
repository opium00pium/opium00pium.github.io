<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last.fm Stats</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Your Last.fm Stats</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Top Tracks</a></li>
                <li><a href="#">Top Artists</a></li>
                <li><a href="#">Recent Scrobbles</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="top-tracks">
            <h2>Top Tracks</h2>
            <ol>
                <li>
                    <span class="track-name">Track 1 Name</span>
                    <span class="artist-name">Artist 1 Name</span>
                    <span class="play-count">Play Count: 100</span>
                </li>
                <!-- Repeat the above li structure for each top track -->
            </ol>
        </section>

        <section class="top-artists">
            <h2>Top Artists</h2>
            <ol>
                <li>
                    <span class="artist-name">Artist 1 Name</span>
                    <span class="play-count">Play Count: 200</span>
                </li>
                <!-- Repeat the above li structure for each top artist -->
            </ol>
        </section>

        <section class="recent-scrobbles">
            <h2>Recent Scrobbles</h2>
            <ul>
                <li>
                    <span class="track-name">Track 1 Name</span>
                    <span class="artist-name">Artist 1 Name</span>
                    <span class="timestamp">Timestamp: YYYY-MM-DD HH:MM</span>
                </li>
                <!-- Repeat the above li structure for each recent scrobble -->
            </ul>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 Your Last.fm Stats</p>
    </footer>
</body>
</html>
